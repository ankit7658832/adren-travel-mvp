# OPS-06 — Java 25 toolchain compatibility. JDK 25 tightened the default
# native-access policy (JEP 472 lineage); without this flag every gradlew
# invocation prints "WARNING: A restricted method in java.lang.System has
# been called ... by net.rubygrapefruit.platform" from Gradle's own
# native-platform library, not from this project's code.
org.gradle.jvmargs=--enable-native-access=ALL-UNNAMED
