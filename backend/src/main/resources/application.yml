spring:
  application:
    name: adren-travel-backend

  # OPS-09, RULES.md S5.3 — "local" activates whenever SPRING_PROFILES_ACTIVE
  # isn't explicitly set (application-local.yml supplies the local-Docker-Compose
  # plaintext defaults this base file deliberately does NOT). "dev"/"test" are
  # profile groups over "local" so their existing single-flag activation
  # (SPRING_PROFILES_ACTIVE=dev, SPRING_PROFILES_ACTIVE=test) keeps getting
  # local's infra defaults without duplicating them — only "staging" (or any
  # other real, non-local profile) is deliberately NOT grouped with "local",
  # so it gets zero plaintext fallback and fails fast on a missing env var
  # instead of silently reusing a dev credential.
  profiles:
    default: local
    group:
      dev: local
      test: local

  datasource:
    # No default url/username/password here — see the group note above for
    # why "local"/"dev"/"test" still work zero-config.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  modulith:
    events:
      jdbc-schema-initialization:
        # Flyway (V3__init_modulith_event_publication.sql) owns this table,
        # not Modulith's own runtime initializer — ddl-auto: validate means
        # nothing but Flyway is allowed to create schema (RULES.md §4.2).
        enabled: false

# Groq (free-tier LLM) — MVP substitute for the AI Governance module's model
# provider (PRD Section 11). Groq's API is OpenAI-compatible.
adren:
  ai:
    groq:
      base-url: https://api.groq.com/openai/v1
      # OPS-07 — no plaintext api-key property here (RULES.md S5.3):
      # GroqApiKeyResolver resolves it from Secrets Manager (adren/ai/groq-api-key),
      # which docker-compose.yml seeds locally from GROQ_API_KEY if set.
      model: llama-3.3-70b-versatile
      # AI-13, PRD S24.3/S9.6 — bounded per-segment timeout so a slow/hung
      # Groq call can't blow the 10-minute itinerary-build target.
      timeout-seconds: ${GROQ_TIMEOUT_SECONDS:15}
      max-retries: ${GROQ_MAX_RETRIES:2}
  security:
    jwt:
      # OPS-09 — no plaintext default here; application-local.yml supplies
      # one for local/dev/test. Any other profile (e.g. staging) MUST set
      # ADREN_JWT_SECRET or startup fails on the unresolved placeholder,
      # rather than silently reusing a dev secret (RULES.md S5.3).
      secret: ${ADREN_JWT_SECRET}
      expiration-minutes: ${ADREN_JWT_EXPIRATION_MINUTES:60}
  aws:
    # OPS-09 — no endpoint-override default here (see AwsProperties'
    # Javadoc): unset means the AWS SDK resolves the real regional
    # endpoint via DefaultCredentialsProvider. application-local.yml points
    # this at LocalStack for local/dev/test.
    region: ap-south-1
    # FND-12 — the CMK BYOS credentials' data keys are wrapped with. This
    # alias must exist in whichever KMS (LocalStack or real AWS) endpoint-override
    # resolves to; docker-compose.yml's localstack service provisions it on
    # every fresh `docker compose up` via docker/localstack-init/create-kms-key.sh
    # (OPS-01).
    kms-key-id: ${ADREN_KMS_KEY_ID:alias/adren-byos-credentials}
  supplier:
    local-dmc:
      # DMC-05/DMC-11 — a Local DMC record is flagged once cancellation
      # rate exceeds this fraction (0.2 = 20%) or complaint count reaches
      # this many, and its inventory is flagged stale once its newest item
      # hasn't been updated within this many days (PRD §10.5's sync-failure
      # alerting, extended to the manual/no-live-API Local DMC path).
      cancellation-rate-threshold: ${ADREN_LOCAL_DMC_CANCELLATION_RATE_THRESHOLD:0.2}
      complaint-count-threshold: ${ADREN_LOCAL_DMC_COMPLAINT_COUNT_THRESHOLD:3}
      inventory-staleness-threshold-days: ${ADREN_LOCAL_DMC_INVENTORY_STALENESS_THRESHOLD_DAYS:30}
    content-sync:
      # HRD-13 — a supplier's cached content is flagged stale once it hasn't
      # refreshed within this window; one threshold per sync cadence
      # category (hotels/activities sync nightly, cruise syncs weekly per
      # SupplierContentSyncService) so a weekly cadence isn't falsely
      # flagged against a threshold sized for a nightly one. Set generously
      # above the underlying cadence so one missed run doesn't alert.
      hotels-staleness-threshold: ${ADREN_SUPPLIER_HOTELS_STALENESS_THRESHOLD:48h}
      cruise-staleness-threshold: ${ADREN_SUPPLIER_CRUISE_STALENESS_THRESHOLD:14d}
      activities-staleness-threshold: ${ADREN_SUPPLIER_ACTIVITIES_STALENESS_THRESHOLD:48h}
  payments:
    tax:
      # FIN-17, PRD §12.1 Worked Example C / §19: illustrative rates only —
      # exact GST/TCS figures/mechanics are pending tax-counsel sign-off,
      # so this stays off by default; a real deployment must not flip this
      # on without confirmed rates replacing the illustrative ones below.
      india:
        enabled: ${ADREN_INDIA_TAX_ENABLED:false}
        gst-percent: 5
        tcs-percent: 5
        tcs-threshold: 700000
      # FIN-18, PRD §12.1 Worked Example D / §19: same "illustrative rate,
      # pending tax-counsel sign-off" reasoning as india above — applies to
      # the Consultant's margin only, never the full package sale price.
      uk-toms:
        enabled: ${ADREN_UK_TOMS_VAT_ENABLED:false}
        vat-percent: 20
    # ADS-14, PRD §1/§19: exact ad-spend billing model is an open item
    # pending business confirmation — same "illustrative, off by default"
    # shape as tax.india/tax.uk-toms above. managed-service-fee-percent is
    # a placeholder figure, not a confirmed business rate.
    ad-spend:
      enabled: ${ADREN_AD_SPEND_BILLING_ENABLED:false}
      managed-service-fee-percent: 15
  ads:
    # ADS-15, PRD §14.3: a rule-based first-pass brand-safety check ahead
    # of the Super Admin's manual policy-review queue — data-driven (RULES.md
    # §24.7's reasoning) so the phrase list can change without a release.
    # Illustrative starter set, not a legally-reviewed policy list.
    brand-safety:
      banned-phrases:
        - guaranteed
        - risk-free
        - best price ever
        - 100% safe
        - no cancellation fee ever

server:
  port: 8080

# RULES.md §6.2 — JSON-structured console logs so log aggregation/search
# (not tailing a file) is the primary debugging tool across six
# jurisdictions. Spring Boot's built-in ECS structured formatter includes
# every MDC entry (traceId, consultantId, currency, market) as top-level
# fields automatically — no custom Logback encoder needed.
logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
