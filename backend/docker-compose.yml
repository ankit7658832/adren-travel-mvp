services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adren_travel
      POSTGRES_USER: adren
      POSTGRES_PASSWORD: adren
    ports:
      - "5432:5432"
    volumes:
      - adren-postgres-data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3,sqs,sns,secretsmanager,kms
      DEBUG: 1
    ports:
      - "4566:4566"
    volumes:
      - adren-localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  # OPS-01 — FND-12's BYOS envelope-encryption key (adren.aws.kms-key-id,
  # default alias/adren-byos-credentials) has no real-AWS fallback locally,
  # so bootRun needs this alias to already resolve to a real KMS key on
  # every fresh `docker compose up` — otherwise KmsEnvelopeEncryptionService
  # fails at the first BYOS credential save, not at startup. A one-shot
  # init container (not a bind-mounted LocalStack ready-hook script) so this
  # has no host-path/file-sharing dependency on the Docker backend in use.
  localstack-kms-init:
    image: amazon/aws-cli:2.17.62
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-south-1
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "aws --endpoint-url=http://localstack:4566 kms describe-key --key-id alias/adren-byos-credentials >/dev/null 2>&1 ||
       (KEY_ID=$$(aws --endpoint-url=http://localstack:4566 kms create-key --description 'adren-travel BYOS credential envelope key' --query 'KeyMetadata.KeyId' --output text) &&
        aws --endpoint-url=http://localstack:4566 kms create-alias --alias-name alias/adren-byos-credentials --target-key-id $$KEY_ID &&
        echo Created alias/adren-byos-credentials)"
    restart: "no"

  # OPS-02 — seeds one placeholder Secrets Manager entry per Adren-owned
  # supplier (SupplierId, excluding LOCAL_DMC/BYOS which never get a
  # SupplierCredential row) under the exact naming scheme
  # AwsSupplierSecretsService (FND-11) itself uses —
  # adren/supplier-credentials/<SUPPLIER_ID> — so a fresh local/dev/
  # integrationTest environment has real ARNs to resolve against instead
  # of an empty Secrets Manager.
  localstack-supplier-secrets-init:
    image: amazon/aws-cli:2.17.62
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-south-1
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "for SUPPLIER in HOTELBEDS STUBA TBO MYSTIFLY TRANSFERZ WIDGETY HBACTIVITIES; do
        NAME=adren/supplier-credentials/$$SUPPLIER;
        VALUE=placeholder-local-dev-credential-$$SUPPLIER;
        (aws --endpoint-url=http://localstack:4566 secretsmanager create-secret --name $$NAME --secret-string $$VALUE >/dev/null 2>&1 && echo Created $$NAME) ||
        (aws --endpoint-url=http://localstack:4566 secretsmanager put-secret-value --secret-id $$NAME --secret-string $$VALUE >/dev/null && echo Updated $$NAME);
      done"
    restart: "no"

volumes:
  adren-postgres-data:
  adren-localstack-data:
